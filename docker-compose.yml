services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hydration
      POSTGRES_PASSWORD: hydration
      POSTGRES_DB: hydration
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://hydration:hydration@postgres:5432/hydration
    env_file:
      - .env
    volumes:
      # Mount .env read-write so the backend can persist rotated
      # Camgenium refresh tokens back to the host.
      - ./.env:/app/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  pgdata:
