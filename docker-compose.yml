services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: hydration
      POSTGRES_PASSWORD: hydration
      POSTGRES_DB: hydration
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://hydration:hydration@postgres:5432/hydration
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mosquitto

volumes:
  pgdata:
